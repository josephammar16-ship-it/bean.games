<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Click Game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #006847, #0b3d2e);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #game {
            width: 100%;
            height: 100%;
            position: relative;
        }

        h1 {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        #score {
            position: absolute;
            top: 60px;
            left: 20px;
            font-size: 22px;
        }

        #time {
            position: absolute;
            top: 60px;
            right: 20px;
            font-size: 22px;
        }

        #ball {
            position: absolute;
            font-size: 60px;
            cursor: pointer;
            user-select: none;
            transition: .2s;
        }

        #ball:hover {
            transform: scale(1.2);
        }

        #start {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            font-size: 24px;
            border: none;
            border-radius: 15px;
            background: gold;
            cursor: pointer;
        }

        #result {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: none;
            text-align: center;
        }

        button {
            padding: 12px 25px;
            margin-top: 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: gold;
        }
    </style>
</head>

<body>

    <div id="game">

        <h1>🏆 World Cup Game</h1>

        <div id="score">النقاط: 0</div>
        <div id="time">30</div>

        <div id="ball">⚽</div>

        <button id="start">start game</button>

        <div id="result">
            <h2 id="final"></h2>
            <button onclick="location.reload()">play again</button>
        </div>

    </div>

    <script>

        const ball = document.getElementById("ball");
        const scoreTxt = document.getElementById("score");
        const timeTxt = document.getElementById("time");
        const start = document.getElementById("start");
        const result = document.getElementById("result");
        const final = document.getElementById("final");

        let score = 0;
        let time = 30;
        let interval;

        ball.style.display = "none";

        function moveBall() {

            const x = Math.random() * (window.innerWidth - 80);
            const y = 100 + Math.random() * (window.innerHeight - 180);

            ball.style.left = x + "px";
            ball.style.top = y + "px";

        }

        ball.onclick = function () {

            score++;
            scoreTxt.innerHTML = "score: " + score;
            moveBall();

        }

        start.onclick = function () {

            start.style.display = "none";
            ball.style.display = "block";

            moveBall();

            interval = setInterval(() => {

                time--;
                timeTxt.innerHTML = time;

                moveBall();

                if (time <= 0) {

                    clearInterval(interval);

                    ball.style.display = "none";

                    result.style.display = "block";

                    final.innerHTML = "🏆  times upbr><br>your score : " + score;

                }

            }, 1000);

        }

    </script>

</body>

</html>
