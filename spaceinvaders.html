<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Space Invaders Mini</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh
        }

        .wrap {
            text-align: center
        }

        canvas {
            background: #050816;
            border: 2px solid #fff;
            max-width: 100%;
            height: auto
        }

        button {
            padding: 10px 20px;
            margin-top: 10px
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>👾 Space Invaders Mini</h1>
        <div>Score: <span id="score">0</span></div>
        <canvas id="game" width="700" height="500"></canvas><br>
        <button onclick="restart()">🔄 Restart</button>
    </div>

    <script>
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");
        const scoreEl = document.getElementById("score");

        let player, bullets, enemies, score, running;

        function start() {
            player = { x: 330, y: 450, w: 40, h: 20 };
            bullets = [];
            enemies = [];
            score = 0;
            running = true;

            for (let r = 0; r < 4; r++) {
                for (let col = 0; col < 8; col++) {
                    enemies.push({ x: 60 + col * 70, y: 40 + r * 50, w: 35, h: 25 });
                }
            }
            requestAnimationFrame(loop);
        }

        function shoot() {
            if (running) bullets.push({ x: player.x + 18, y: player.y });
        }

        function loop() {
            if (!running) return;

            ctx.clearRect(0, 0, 700, 500);

            ctx.fillStyle = "cyan";
            ctx.fillRect(player.x, player.y, player.w, player.h);

            bullets.forEach(b => {
                b.y -= 8;
                ctx.fillStyle = "yellow";
                ctx.fillRect(b.x, b.y, 4, 12);
            });

            enemies.forEach(e => {
                e.y += 0.03;
                ctx.fillStyle = "lime";
                ctx.fillRect(e.x, e.y, e.w, e.h);
                if (e.y > 420) {
                    running = false;
                    setTimeout(() => alert("Game Over!"), 50);
                }
            });

            bullets.forEach((b, bi) => {
                enemies.forEach((e, ei) => {
                    if (b.x < e.x + e.w && b.x + 4 > e.x && b.y < e.y + e.h && b.y + 12 > e.y) {
                        bullets.splice(bi, 1);
                        enemies.splice(ei, 1);
                        score += 10;
                        scoreEl.textContent = score;
                    }
                });
            });

            if (enemies.length === 0) {
                running = false;
                setTimeout(() => alert("🎉 You Win! Score: " + score), 50);
            }

            bullets = bullets.filter(b => b.y > -20);

            requestAnimationFrame(loop);
        }

        document.addEventListener("keydown", e => {
            if (e.code === "ArrowLeft") player.x = Math.max(0, player.x - 20);
            if (e.code === "ArrowRight") player.x = Math.min(660, player.x + 20);
            if (e.code === "Space") shoot();
        });

        c.addEventListener("click", shoot);

        function restart() { start(); }
        start();
    </script>
</body>

</html>
