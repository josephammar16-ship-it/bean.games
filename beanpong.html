<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wrap {
            text-align: center
        }

        canvas {
            background: black;
            border: 3px solid white;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>🏓 Pong</h1>
        <div>
            Player: <span id="playerScore">0</span>
            |
            AI: <span id="aiScore">0</span>
        </div>
        <canvas id="game" width="800" height="450"></canvas><br>
        <button onclick="restart()">🔄 Restart</button>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const playerScoreEl = document.getElementById("playerScore");
        const aiScoreEl = document.getElementById("aiScore");

        let playerScore = 0;
        let aiScore = 0;

        let player = { x: 20, y: 180, w: 15, h: 100 };
        let ai = { x: 765, y: 180, w: 15, h: 100 };

        let ball = { x: 400, y: 225, vx: 5, vy: 4, size: 12 };

        function draw() {

            ctx.clearRect(0, 0, 800, 450);

            ctx.fillStyle = "white";

            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillRect(ai.x, ai.y, ai.w, ai.h);

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fill();

            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.y < 0 || ball.y > 450) {
                ball.vy *= -1;
            }

            if (
                ball.x - ball.size < player.x + player.w &&
                ball.y > player.y &&
                ball.y < player.y + player.h
            ) {
                ball.vx = Math.abs(ball.vx);
            }

            if (
                ball.x + ball.size > ai.x &&
                ball.y > ai.y &&
                ball.y < ai.y + ai.h
            ) {
                ball.vx = -Math.abs(ball.vx);
            }

            if (ball.x < 0) {
                aiScore++;
                aiScoreEl.textContent = aiScore;
                resetBall();
            }

            if (ball.x > 800) {
                playerScore++;
                playerScoreEl.textContent = playerScore;
                resetBall();
            }

            ai.y += (ball.y - (ai.y + 50)) * 0.05;

            requestAnimationFrame(draw);
        }

        function resetBall() {
            ball.x = 400;
            ball.y = 225;
            ball.vx = (Math.random() > 0.5 ? 5 : -5);
            ball.vy = (Math.random() > 0.5 ? 4 : -4);
        }

        document.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            player.y = e.clientY - rect.top - 50;
        });

        canvas.addEventListener("touchmove", e => {
            const rect = canvas.getBoundingClientRect();
            player.y = e.touches[0].clientY - rect.top - 50;
        });

        function restart() {
            playerScore = 0;
            aiScore = 0;
            playerScoreEl.textContent = 0;
            aiScoreEl.textContent = 0;
            resetBall();
        }

        draw();
    </script>
</body>

</html>
