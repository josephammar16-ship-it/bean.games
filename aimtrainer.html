<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aim Trainer</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        #game {
            width: 100%;
            height: 500px;
            background: #1e293b;
            border: 3px solid white;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
        }

        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: red;
            cursor: pointer;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🎯 Aim Trainer</h1>

        <div class="stats">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="time">30</span></div>
            <div>Best: <span id="best">0</span></div>
        </div>

        <div id="game"></div>

        <button onclick="restartGame()">
            🔄 Restart
        </button>

    </div>

    <script>
        const game = document.getElementById("game");
        const scoreEl = document.getElementById("score");
        const timeEl = document.getElementById("time");
        const bestEl = document.getElementById("best");

        let score = 0;
        let time = 30;
        let timer;
        let best = localStorage.getItem("aimBest") || 0;

        bestEl.textContent = best;

        function spawnTarget() {

            if (time <= 0) return;

            const target = document.createElement("div");
            target.className = "target";

            const x = Math.random() * (game.clientWidth - 60);
            const y = Math.random() * (game.clientHeight - 60);

            target.style.left = x + "px";
            target.style.top = y + "px";

            target.onclick = () => {

                score++;
                scoreEl.textContent = score;

                target.remove();

                spawnTarget();
            };

            game.innerHTML = "";
            game.appendChild(target);
        }

        function startGame() {

            clearInterval(timer);

            score = 0;
            time = 30;

            scoreEl.textContent = 0;
            timeEl.textContent = time;

            spawnTarget();

            timer = setInterval(() => {

                time--;
                timeEl.textContent = time;

                if (time <= 0) {

                    clearInterval(timer);

                    game.innerHTML = "";

                    if (score > best) {
                        best = score;
                        localStorage.setItem("aimBest", best);
                        bestEl.textContent = best;
                    }

                    alert("🎯 Time Up!\nScore: " + score);
                }

            }, 1000);
        }

        function restartGame() {
            startGame();
        }

        startGame();
    </script>

</body>

</html>
