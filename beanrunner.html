<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Bean Runner</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial
        }

        body {
            margin: 0;
            background: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh
        }

        .wrap {
            text-align: center
        }

        canvas {
            background: #222;
            border: 3px solid #fff;
            max-width: 100%;
            border-radius: 12px
        }

        button {
            margin-top: 10px;
            padding: 10px 20px
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>🚇 Bean Runner</h1>
        <div>Score: <span id="score">0</span></div>
        <canvas id="c" width="400" height="600"></canvas><br>
        <button onclick="restart()">🔄 Restart</button>
    </div>
    <script>
        const c = document.getElementById('c');
        const x = c.getContext('2d');
        const scoreEl = document.getElementById('score');
        let player, obs, score, run;

        function start() {
            player = { lane: 1, y: 500, vy: 0, jumping: false };
            obs = []; score = 0; run = true;
            spawn();
            requestAnimationFrame(loop);
        }

        function spawn() {
            if (!run) return;
            obs.push({ lane: Math.floor(Math.random() * 3), y: -80 });
            setTimeout(spawn, 1200);
        }

        function laneX(l) { return 70 + l * 120; }

        function jump() {
            if (!player.jumping) {
                player.jumping = true;
                player.vy = -12;
            }
        }

        function loop() {
            if (!run) return;

            x.clearRect(0, 0, 400, 600);

            for (let i = 1; i < 3; i++) {
                x.fillStyle = "#555";
                x.fillRect(i * 133, 0, 4, 600);
            }

            player.vy += 0.6;
            player.y += player.vy;

            if (player.y >= 500) {
                player.y = 500;
                player.vy = 0;
                player.jumping = false;
            }

            x.font = "40px Arial";
            x.fillText("🏃", laneX(player.lane), player.y);

            obs.forEach(o => {
                o.y += 6;
                x.fillText("🧱", laneX(o.lane), o.y);

                if (o.lane === player.lane && o.y > 450 && o.y < 540 && !player.jumping) {
                    run = false;
                    setTimeout(() => alert("Game Over! Score: " + Math.floor(score / 10)), 50);
                }
            });

            obs = obs.filter(o => o.y < 650);

            score++;
            scoreEl.textContent = Math.floor(score / 10);

            requestAnimationFrame(loop);
        }

        document.addEventListener("keydown", e => {
            if (e.code === "ArrowLeft" && player.lane > 0) player.lane--;
            if (e.code === "ArrowRight" && player.lane < 2) player.lane++;
            if (e.code === "Space" || e.code === "ArrowUp") jump();
        });

        c.addEventListener("click", jump);
        c.addEventListener("touchstart", e => { e.preventDefault(); jump(); });

        function restart() { start(); }

        start();
    </script>
</body>

</html>
