<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Challenge</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        #area {
            position: relative;
            width: 100%;
            height: 400px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
        }

        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            background: #38bdf8;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="game">
        <h1>🎯 Click Challenge</h1>

        <div class="stats">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="time">30</span></div>
        </div>

        <div id="area"></div>

        <button onclick="startGame()">Start Game</button>
    </div>

    <script>
        const area = document.getElementById("area");
        const scoreEl = document.getElementById("score");
        const timeEl = document.getElementById("time");

        let score = 0;
        let time = 30;
        let timer;
        let active = false;

        function createTarget() {
            if (!active) return;

            const target = document.createElement("div");
            target.className = "target";

            const x = Math.random() * (area.clientWidth - 60);
            const y = Math.random() * (area.clientHeight - 60);

            target.style.left = x + "px";
            target.style.top = y + "px";

            target.onclick = () => {
                score++;
                scoreEl.textContent = score;
                target.remove();
                createTarget();
            };

            area.innerHTML = "";
            area.appendChild(target);
        }

        function startGame() {
            score = 0;
            time = 30;

            scoreEl.textContent = score;
            timeEl.textContent = time;

            active = true;

            createTarget();

            clearInterval(timer);

            timer = setInterval(() => {
                time--;
                timeEl.textContent = time;

                if (time <= 0) {
                    clearInterval(timer);
                    active = false;
                    area.innerHTML = "";
                    alert("Game Over! Score: " + score);
                }
            }, 1000);
        }
    </script>

</body>

</html>
