<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Deluxe</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .score {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        canvas {
            background: #000;
            border: 3px solid white;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            height: auto;
        }

        button {
            margin-top: 10px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            background: #22c55e;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🐍 Snake Deluxe</h1>

        <div class="score">
            Score: <span id="score">0</span>
        </div>

        <canvas id="game" width="500" height="500"></canvas>

        <br>

        <button onclick="restartGame()">
            🔄 Restart
        </button>

    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        const grid = 20;

        let snake;
        let food;
        let dx;
        let dy;
        let score;
        let gameLoop;

        function startGame() {

            snake = [
                { x: 200, y: 200 }
            ];

            food = randomFood();

            dx = grid;
            dy = 0;

            score = 0;
            scoreEl.textContent = 0;

            clearInterval(gameLoop);

            gameLoop = setInterval(update, 120);
        }

        function randomFood() {

            return {
                x: Math.floor(Math.random() * 25) * 20,
                y: Math.floor(Math.random() * 25) * 20
            };

        }

        function update() {

            const head = {
                x: snake[0].x + dx,
                y: snake[0].y + dy
            };

            if (
                head.x < 0 ||
                head.y < 0 ||
                head.x >= 500 ||
                head.y >= 500 ||
                snake.some(
                    part =>
                        part.x === head.x &&
                        part.y === head.y
                )
            ) {

                clearInterval(gameLoop);

                setTimeout(() => {
                    alert(
                        "💀 Game Over!\n\nScore: " + score
                    );
                }, 50);

                return;
            }

            snake.unshift(head);

            if (
                head.x === food.x &&
                head.y === food.y
            ) {

                score++;
                scoreEl.textContent = score;

                food = randomFood();

            } else {

                snake.pop();

            }

            ctx.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            ctx.fillStyle = "red";
            ctx.fillRect(
                food.x,
                food.y,
                grid,
                grid
            );

            ctx.fillStyle = "lime";

            snake.forEach(part => {

                ctx.fillRect(
                    part.x,
                    part.y,
                    grid,
                    grid
                );

            });
        }

        document.addEventListener(
            "keydown",
            e => {

                if (
                    e.code === "ArrowUp" &&
                    dy === 0
                ) {
                    dx = 0;
                    dy = -grid;
                }

                if (
                    e.code === "ArrowDown" &&
                    dy === 0
                ) {
                    dx = 0;
                    dy = grid;
                }

                if (
                    e.code === "ArrowLeft" &&
                    dx === 0
                ) {
                    dx = -grid;
                    dy = 0;
                }

                if (
                    e.code === "ArrowRight" &&
                    dx === 0
                ) {
                    dx = grid;
                    dy = 0;
                }

            }
        );

        function restartGame() {
            startGame();
        }

        startGame();
    </script>

</body>

</html>
